name: Build ML image to OCIR

on:
workflow_dispatch:

permissions:
contents: read

env:
REGISTRY: sin.ocir.io
IMAGE_NAME: axgifcpjc5re/air-quality-ml

jobs:
build-and-push:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v6

  - name: Generate image tag
    id: image
    shell: bash
    run: |
      TAG="ml-${GITHUB_SHA::7}-$(date -u +%Y%m%d%H%M)"
      echo "tag=$TAG" >> "$GITHUB_OUTPUT"
      echo "full_image=${REGISTRY}/${IMAGE_NAME}:${TAG}" >> "$GITHUB_OUTPUT"

  - name: Login to OCIR
    uses: docker/login-action@v4
    with:
      registry: ${{ env.REGISTRY }}
      username: ${{ secrets.OCIR_USERNAME }}
      password: ${{ secrets.OCIR_AUTH_TOKEN }}

  - name: Set up Docker Buildx
    uses: docker/setup-buildx-action@v4

  - name: Build and push AMD64 ML image
    uses: docker/build-push-action@v7
    with:
      context: ./air-quality-ml
      file: ./air-quality-ml/Dockerfile
      platforms: linux/amd64
      push: true
      tags: ${{ steps.image.outputs.full_image }}
      cache-from: type=gha
      cache-to: type=gha,mode=max

  - name: Print pushed image
    run: |
      echo "Pushed image:"
      echo "${{ steps.image.outputs.full_image }}"
```
