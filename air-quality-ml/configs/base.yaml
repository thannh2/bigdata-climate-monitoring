project_name: air-quality-ml
environment: dev
owner: data-platform

spark:
  app_name: air-quality-ml-pipeline
  master: local[*]
  shuffle_partitions: 16
  session_timezone: UTC

data:
  # Dữ liệu đã transform sẵn từ processing/transform_feature.py
  # Path từ configs/ lên root: configs/ -> air-quality-ml/ -> root/ -> Data/
  features_path: ../../Data/extracted features/features
  gold_predictions_path: ../../Data/gold/predictions
  gold_eval_path: ../../Data/gold/prediction_eval
  monitoring_path: ../../Data/gold/monitoring

mlflow:
  tracking_uri: http://localhost:5000
  experiment_root: air-quality
  registry_uri: null

features:
  horizons: [1, 6, 12, 24]  # Horizons có trong dữ liệu transform
  alert_pm25_threshold: 35.0
  high_pollution_threshold: 75.0

split:
  timestamp_col: timestamp
  train_end: "2024-12-31 23:00:00"
  val_end: "2025-06-30 23:00:00"

promotion:
  regression_mae_improve_ratio: 0.95
  max_mae_high_pollution_ratio: 1.0
  classification_min_recall: 0.80
  classification_min_auprc_ratio: 1.0
  classification_max_fnr: 0.20
