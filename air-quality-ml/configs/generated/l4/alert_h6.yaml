task: classification
horizon: 6
target_col: target_alert_6h
target_name: alert
prediction_unit: binary
output_kind: classification
prediction_col: prediction
probability_col: probability
model_type: gbt
model_name: aq_alert_classifier_h6
experiment_name: air-quality/alert-classifier/h6
training:
  label_col: target_alert_6h
  max_rows: null
  dropna_label: true
params:
  maxDepth: 5
  maxIter: 50
  stepSize: 0.1
threshold_tuning:
  enabled: true
  min_precision: 0.35
  min_recall: 0.8
  default_threshold: 0.5
model_selection:
  metric: auprc
  candidates:
  - model_type: logistic
    params:
      maxIter: 100
  - model_type: gbt
    params:
      maxDepth: 5
      maxIter: 50
      stepSize: 0.1
register_if_pass: true
