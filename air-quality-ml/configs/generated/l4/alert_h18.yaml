task: classification
horizon: 18
target_col: target_alert_18h
target_name: alert
prediction_unit: binary
output_kind: classification
prediction_col: prediction
probability_col: probability
model_type: gbt
model_name: aq_alert_classifier_h18
experiment_name: air-quality/alert-classifier/h18
training:
  label_col: target_alert_18h
  max_rows: null
  dropna_label: true
params:
  maxDepth: 6
  maxIter: 70
  stepSize: 0.1
threshold_tuning:
  enabled: true
  min_precision: 0.35
  min_recall: 0.8
  default_threshold: 0.5
model_selection:
  metric: auprc
  candidates:
  - model_type: logistic
    params:
      maxIter: 100
  - model_type: gbt
    params:
      maxDepth: 6
      maxIter: 70
      stepSize: 0.1
register_if_pass: true
