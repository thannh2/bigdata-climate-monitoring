task: regression
horizon: 6
target_col: target_pm25_6h
prediction_col: prediction
model_type: gbt
model_name: aq_pm25_forecast_h6
experiment_name: air-quality/forecast-pm25/h6
threshold_col: null

training:
  label_col: target_pm25_6h
  max_rows: null
  dropna_label: true
  features:
    numeric:
      - pm2_5
      - us_aqi
      - pm25_acc_12h
      - humidity
      - pressure
      - wind_speed
      - wind_dir
      - wind_U
      - wind_V
      - is_stagnant_air
      - temp_c
      - hour_sin
      - hour_cos
      - coord_X
      - coord_Y
      - coord_Z
    categorical:
      - region
      - city

params:
  maxDepth: 6
  maxIter: 100
  stepSize: 0.05
  subsamplingRate: 0.85

register_if_pass: true
