task: regression
horizon: 1
target_col: target_wind_speed_1h
prediction_col: prediction
model_type: gbt
model_name: weather_wind_speed_forecast_h1
experiment_name: weather/forecast-wind-speed/h1
threshold_col: null

training:
  label_col: target_wind_speed_1h
  max_rows: null
  dropna_label: true
  features:
    numeric:
      - wind_speed
      - wind_dir
      - wind_U
      - wind_V
      - wind_shear_U
      - wind_shear_V
      - pressure
      - pressure_delta_3h
      - temp_c
      - humidity
      - cloud_cover
      - hour_sin
      - hour_cos
      - coord_X
      - coord_Y
      - coord_Z
    categorical:
      - region
      - city

params:
  maxDepth: 6
  maxIter: 100
  stepSize: 0.05
  subsamplingRate: 0.85

register_if_pass: true
