task: regression
horizon: 4
target_col: target_cloud_cover_4h
prediction_col: prediction
model_type: gbt
model_name: weather_cloud_cover_forecast_h4
experiment_name: weather/forecast-cloud-cover/h4
threshold_col: null

training:
  label_col: target_cloud_cover_4h
  max_rows: null
  dropna_label: true
  features:
    numeric:
      - cloud_cover
      - humidity
      - pressure
      - temp_c
      - dew_point
      - precipitation
      - shortwave_radiation
      - hour_sin
      - hour_cos
      - coord_X
      - coord_Y
      - coord_Z
    categorical:
      - region
      - city

params:
  maxDepth: 6
  maxIter: 100
  stepSize: 0.05
  subsamplingRate: 0.85

register_if_pass: true
