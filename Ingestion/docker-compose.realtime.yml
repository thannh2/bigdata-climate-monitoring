# Docker Compose for Real-time Hanoi Air Quality System
# Optimized for low-latency streaming and high performance

version: '3.8'

services:
  # Kafka (KRaft mode for better performance)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: hanoi-kafka
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      # Performance optimizations
      KAFKA_COMPRESSION_TYPE: 'lz4'
      KAFKA_LOG_CLEANUP_POLICY: 'delete'
      KAFKA_LOG_RETENTION_MS: 604800000  # 7 days
      KAFKA_LOG_SEGMENT_BYTES: 1073741824  # 1GB
      KAFKA_NUM_NETWORK_THREADS: 8
      KAFKA_NUM_IO_THREADS: 8
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 102400
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 102400
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600
      # Replication settings for single node
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: kafka-topics --bootstrap-server kafka:29092 --list
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - hanoi_network

  # Redis for high-performance caching
  redis:
    image: redis:7.2-alpine
    hostname: redis
    container_name: hanoi-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
      --tcp-keepalive 300
      --timeout 0
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - hanoi_network

  # Schema Registry for data governance
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    hostname: schema-registry
    container_name: hanoi-schema-registry
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: 'kafka:29092'
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: curl -f http://localhost:8081/subjects || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - hanoi_network

  # AKHQ for Kafka monitoring
  akhq:
    image: tchiotludo/akhq:0.24.0
    hostname: akhq
    container_name: hanoi-akhq
    depends_on:
      - kafka
      - schema-registry
    ports:
      - "8080:8080"
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            hanoi-kafka:
              properties:
                bootstrap.servers: "kafka:29092"
              schema-registry:
                url: "http://schema-registry:8081"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8080 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - hanoi_network

  # Real-time Collector
  realtime-collector:
    build:
      context: .
      dockerfile: Dockerfile.collector
    hostname: realtime-collector
    container_name: hanoi-realtime-collector
    depends_on:
      - kafka
      - redis
    environment:
      - KAFKA_SERVERS=kafka:29092
      - REDIS_URL=redis://redis:6379
      - OPENWEATHERMAP_API_KEY=${OPENWEATHERMAP_API_KEY}
      - IQAIR_API_KEY=${IQAIR_API_KEY}
      - LOG_LEVEL=INFO
    volumes:
      - ./config/realtime_config.yaml:/app/config.yaml:ro
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 60s
      timeout: 30s
      retries: 3
    restart: unless-stopped
    networks:
      - hanoi_network

  # Stream Processor
  stream-processor:
    build:
      context: .
      dockerfile: Dockerfile.processor
    hostname: stream-processor
    container_name: hanoi-stream-processor
    depends_on:
      - kafka
      - redis
      - realtime-collector
    environment:
      - KAFKA_SERVERS=kafka:29092
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=INFO
    volumes:
      - ./config/realtime_config.yaml:/app/config.yaml:ro
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/health')"]
      interval: 60s
      timeout: 30s
      retries: 3
    restart: unless-stopped
    networks:
      - hanoi_network

  # WebSocket Server
  websocket-server:
    build:
      context: .
      dockerfile: Dockerfile.websocket
    hostname: websocket-server
    container_name: hanoi-websocket-server
    depends_on:
      - kafka
      - redis
      - stream-processor
    ports:
      - "8765:8765"
    environment:
      - KAFKA_SERVERS=kafka:29092
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=INFO
    volumes:
      - ./config/realtime_config.yaml:/app/config.yaml:ro
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import websockets; import asyncio; asyncio.run(websockets.connect('ws://localhost:8765'))"]
      interval: 60s
      timeout: 30s
      retries: 3
    restart: unless-stopped
    networks:
      - hanoi_network

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v2.45.0
    hostname: prometheus
    container_name: hanoi-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - hanoi_network

  # Grafana for visualization
  grafana:
    image: grafana/grafana:10.0.0
    hostname: grafana
    container_name: hanoi-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - hanoi_network

  # Topic initialization service
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - kafka
    entrypoint: ['/bin/sh', '-c']
    command: |
      "
      # Wait for Kafka to be ready
      echo 'Waiting for Kafka to be ready...'
      while ! kafka-topics --bootstrap-server kafka:29092 --list; do
        sleep 1
      done
      
      # Create topics
      echo 'Creating Kafka topics...'
      
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic hanoi_weather_realtime --partitions 3 --replication-factor 1 \
        --config cleanup.policy=delete --config retention.ms=604800000
      
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic hanoi_air_quality_realtime --partitions 3 --replication-factor 1 \
        --config cleanup.policy=delete --config retention.ms=604800000
      
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic hanoi_weather_processed --partitions 3 --replication-factor 1 \
        --config cleanup.policy=delete --config retention.ms=604800000
      
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic hanoi_air_quality_processed --partitions 3 --replication-factor 1 \
        --config cleanup.policy=delete --config retention.ms=604800000
      
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic hanoi_air_quality_alerts --partitions 1 --replication-factor 1 \
        --config cleanup.policy=delete --config retention.ms=259200000
      
      echo 'Topics created successfully!'
      "
    networks:
      - hanoi_network

volumes:
  kafka_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  hanoi_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16