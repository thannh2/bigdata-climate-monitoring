services:
  airflow-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    networks:
      - airflow_internal

  airflow-init:
    image: apache/airflow:2.10.5
    depends_on:
      - airflow-postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/Ingestion/airflow
      _PIP_ADDITIONAL_REQUIREMENTS: "confluent-kafka==2.13.2 requests==2.32.5 PyYAML==6.0.3 pydantic==1.10.22 psycopg2-binary==2.9.10"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OWM_API_KEY: ${OWM_API_KEY:-}
      AQICN_API_KEY: ${AQICN_API_KEY:-}
      IQAIR_API_KEY: ${IQAIR_API_KEY:-}
    user: "50000:0"
    entrypoint: /bin/bash
    command:
      - -lc
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin || true
    volumes:
      - ./:/opt/airflow
    networks:
      - airflow_internal
      - kafka_network

  airflow-webserver:
    image: apache/airflow:2.10.5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/Ingestion/airflow
      AIRFLOW__WEBSERVER__DEFAULT_UI_TIMEZONE: Asia/Bangkok
      _PIP_ADDITIONAL_REQUIREMENTS: "confluent-kafka==2.13.2 requests==2.32.5 PyYAML==6.0.3 pydantic==1.10.22 psycopg2-binary==2.9.10"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OWM_API_KEY: ${OWM_API_KEY:-}
      AQICN_API_KEY: ${AQICN_API_KEY:-}
      IQAIR_API_KEY: ${IQAIR_API_KEY:-}
    user: "50000:0"
    command: webserver
    ports:
      - "8088:8080"
    volumes:
      - ./:/opt/airflow
    networks:
      - airflow_internal
      - kafka_network

  airflow-scheduler:
    image: apache/airflow:2.10.5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/Ingestion/airflow
      _PIP_ADDITIONAL_REQUIREMENTS: "confluent-kafka==2.13.2 requests==2.32.5 PyYAML==6.0.3 pydantic==1.10.22 psycopg2-binary==2.9.10"
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      OWM_API_KEY: ${OWM_API_KEY:-}
      AQICN_API_KEY: ${AQICN_API_KEY:-}
      IQAIR_API_KEY: ${IQAIR_API_KEY:-}
    user: "50000:0"
    command: scheduler
    volumes:
      - ./:/opt/airflow
    networks:
      - airflow_internal
      - kafka_network

volumes:
  airflow_postgres_data:

networks:
  airflow_internal:
    driver: bridge
  kafka_network:
    external: true
    name: ingestion_kafka_network
