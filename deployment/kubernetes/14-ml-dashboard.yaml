apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: climate-monitoring
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: climate-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: air-quality-ml:local
          imagePullPolicy: IfNotPresent
          command:
            - mlflow
          args:
            - server
            - --host
            - 0.0.0.0
            - --port
            - "5000"
            - --backend-store-uri
            - /workspace/air-quality-ml/mlruns
            - --default-artifact-root
            - file:///workspace/air-quality-ml/mlartifacts
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: climate-monitoring
spec:
  type: NodePort
  selector:
    app: dashboard
  ports:
    - port: 8501
      targetPort: 8501
      nodePort: 30501
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: climate-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: air-quality-ml:local
          imagePullPolicy: IfNotPresent
          command:
            - streamlit
          args:
            - run
            - dashboard/app.py
            - --server.address=0.0.0.0
            - --server.port=8501
          ports:
            - containerPort: 8501
          envFrom:
            - configMapRef:
                name: climate-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-score
  namespace: climate-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stream-score
  template:
    metadata:
      labels:
        app: stream-score
    spec:
      containers:
        - name: stream-score
          image: air-quality-ml:local
          imagePullPolicy: IfNotPresent
          command:
            - python
          args:
            - jobs/stream_score_latest.py
          envFrom:
            - configMapRef:
                name: climate-config
          env:
            - name: SPARK_EXTRA_PACKAGES
              value: "org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1"
            - name: PYARROW_IGNORE_TIMEZONE
              value: "1"
            - name: PYSPARK_PYTHON
              value: "python"
            - name: PYSPARK_DRIVER_PYTHON
              value: "python"
