apiVersion: v1
kind: Service
metadata:
  name: airflow-postgres
  namespace: climate-monitoring
spec:
  selector:
    app: airflow-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-postgres
  namespace: climate-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-postgres
  template:
    metadata:
      labels:
        app: airflow-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: climate-secrets
          volumeMounts:
            - name: airflow-postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: airflow-postgres-data
          persistentVolumeClaim:
            claimName: airflow-postgres-data
---
apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-init
  namespace: climate-monitoring
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: airflow-init
          image: climate-airflow:local
          imagePullPolicy: IfNotPresent
          command:
            - bash
            - -lc
            - |
              airflow db migrate &&
              airflow users create \
                --username "$AIRFLOW_ADMIN_USERNAME" \
                --firstname Admin \
                --lastname User \
                --role Admin \
                --email admin@example.com \
                --password "$AIRFLOW_ADMIN_PASSWORD" || true
          envFrom:
            - configMapRef:
                name: climate-config
            - secretRef:
                name: climate-secrets
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: climate-secrets
                  key: AIRFLOW_DATABASE_URL
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: climate-monitoring
spec:
  type: NodePort
  selector:
    app: airflow-webserver
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30088
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: climate-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      containers:
        - name: airflow-webserver
          image: climate-airflow:local
          imagePullPolicy: IfNotPresent
          args:
            - webserver
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: climate-config
            - secretRef:
                name: climate-secrets
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: climate-secrets
                  key: AIRFLOW_DATABASE_URL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: climate-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      containers:
        - name: airflow-scheduler
          image: climate-airflow:local
          imagePullPolicy: IfNotPresent
          args:
            - scheduler
          envFrom:
            - configMapRef:
                name: climate-config
            - secretRef:
                name: climate-secrets
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: climate-secrets
                  key: AIRFLOW_DATABASE_URL
