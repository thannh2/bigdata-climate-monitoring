version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb_serving
    restart: always
    ports:
      - "${MONGO_PORT}:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASS}
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
    driver: local